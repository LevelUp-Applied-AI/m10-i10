name: "Integration 10 — Dockerize Stack Autograder"
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  structural:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Tier 4 note: this assignment IS the Docker Compose stack. The `stack`
    # job below brings up the full multi-service topology via `docker
    # compose up -d --build` rather than runner-level `services:`. This
    # empty key documents that intent and satisfies the validator gate
    # (see validate_module.sh Check 8).
    services: {}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install structural-test deps
        run: pip install pytest PyYAML
      - name: Structural autograder
        run: pytest tests/ -v --tb=short

  stack:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: structural
    env:
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testtest12345
      WEB_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from CI vars
        run: |
          cat > .env <<'EOF'
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=testtest12345
          WEB_ORIGIN=http://localhost:3000
          EOF
      - name: docker compose up
        run: docker compose up -d --build
      - name: Wait for healthy
        run: |
          for i in $(seq 1 45); do
            unhealthy=$(docker compose ps --format json | python3 -c "import sys,json; svcs=[json.loads(l) for l in sys.stdin if l.strip()]; print(sum(1 for s in svcs if s.get('Health') not in ('healthy','')))")
            if [ "$unhealthy" = "0" ]; then
              echo "all services healthy"
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs
          exit 1
      - name: Seed scripts
        run: |
          bash scripts/seed_neo4j.sh
          bash scripts/seed_weaviate.sh
      - name: Demo curl
        run: |
          curl -fsS -X POST http://localhost:8000/rag/answer \
            -H 'Content-Type: application/json' \
            -d '{"question": "How do I prep ginger for stir-fry?"}'
      - name: Tear down
        if: always()
        run: docker compose down -v
